# arabicpython/aliases/textwrap.toml
# Schema version: 1
#
# Maps Arabic names to the `textwrap` standard-library module.
# Normalization:
#   أ/إ/آ → ا  anywhere
#   final ة → ه
#   final ى → ي

[meta]
arabic_name   = "تنسيق_نص"
python_module = "textwrap"
dict_version  = "ar-v1"
schema_version = 1
maintainer    = "—"

[entries]
# ── Module-level functions ────────────────────────────────────────────────────
"التف"                  = "wrap"
"امل"                   = "fill"
"اختصر"                 = "shorten"
"ازل_مسافه"             = "dedent"
"اضف_بادئه"             = "indent"

# ── Module-level class ────────────────────────────────────────────────────────
"ملتف_نص"               = "TextWrapper"

# ── TextWrapper unbound methods ───────────────────────────────────────────────
"التف_كائن"             = "TextWrapper.wrap"
"امل_كائن"              = "TextWrapper.fill"
