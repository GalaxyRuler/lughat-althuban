# arabicpython/aliases/secrets.toml
# Schema version: 1
#
# Maps Arabic names to the `secrets` standard-library module.
# Normalization:
#   أ/إ/آ → ا  anywhere
#   final ة → ه
#   final ى → ي
#
# Collision notes:
#   اختر → random.choice already uses it. Use اختر_امن for secrets.choice.
#   بتات_عشوائيه → random.randbits already uses it. Use بتات_سريه instead.
#   عشوائي_نظام → random.SystemRandom already uses it. Use عشوائي_امن instead.
#   قارن_بصمه: بصمه root not used elsewhere. Safe.
#   base64 is an internal import — omitted.

[meta]
arabic_name   = "اسرار"
python_module = "secrets"
dict_version  = "ar-v1"
schema_version = 1
maintainer    = "—"

[entries]
# ── Token generators ──────────────────────────────────────────────────────────
"رمز_بايت"              = "token_bytes"
"رمز_سادس_عشري"         = "token_hex"
"رمز_رابط"              = "token_urlsafe"

# ── Secure random utilities ───────────────────────────────────────────────────
"اختر_امن"              = "choice"
"عشوائي_اقل"            = "randbelow"
"بتات_سريه"             = "randbits"
"عشوائي_امن"            = "SystemRandom"

# ── Comparison ────────────────────────────────────────────────────────────────
"قارن_بصمه"             = "compare_digest"

# ── Configuration ─────────────────────────────────────────────────────────────
"انتروبيا_افتراضيه"     = "DEFAULT_ENTROPY"
