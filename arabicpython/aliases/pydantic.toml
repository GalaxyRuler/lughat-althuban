# arabicpython/aliases/pydantic.toml
# C-012: Arabic aliases for Pydantic v2 data validation.

[meta]
arabic_name    = "نماذج_بيانات"
python_module  = "pydantic"
dict_version   = "ar-v1"
schema_version = 1
maintainer     = "—"

[entries]
# ── Model core ────────────────────────────────────────────────────────────────
"نموذج_اساسي"           = "BaseModel"
"نموذج_جذر"             = "RootModel"
"حقل"                   = "Field"
"اعدادات"               = "ConfigDict"
"خطا_تحقق"              = "ValidationError"
"انشئ_نموذج"            = "create_model"
"تحقق_نداء"             = "validate_call"
"مع_اعدادات"            = "with_config"

# ── Validators and serializers ───────────────────────────────────────────────
"تحقق_حقل"              = "field_validator"
"تحقق_نموذج"            = "model_validator"
"حقل_محسوب"             = "computed_field"
"تسلسل_حقل"             = "field_serializer"
"تسلسل_نموذج"           = "model_serializer"
"قبل_تحقق"              = "BeforeValidator"
"بعد_تحقق"              = "AfterValidator"
"تسلسل_بسيط"            = "PlainSerializer"
"تسلسل_ملتفت"           = "WrapSerializer"

# ── Type helpers ─────────────────────────────────────────────────────────────
"محول_نوع"              = "TypeAdapter"
"خاص_سري"               = "PrivateAttr"
"اختيارات_اسماء"        = "AliasChoices"
"مسار_اسم"              = "AliasPath"
"مثيل_من"               = "InstanceOf"
"تخطي_تحقق"             = "SkipValidation"

# ── Common constrained/network types ─────────────────────────────────────────
"بريد"                  = "EmailStr"
"رابط_عام"              = "AnyUrl"
"رابط_http"             = "HttpUrl"
"مسار_ملف"              = "FilePath"
"مسار_مجلد"             = "DirectoryPath"
"نص_سري"                = "SecretStr"
"بايتات_سريه"           = "SecretBytes"
"عدد_موجب"              = "PositiveInt"
"عشري_موجب"             = "PositiveFloat"
"عدد_غير_سالب"          = "NonNegativeInt"
"عشري_غير_سالب"         = "NonNegativeFloat"
"منطقي_صارم"            = "StrictBool"
"عدد_صارم"              = "StrictInt"
"عشري_صارم"             = "StrictFloat"
"نص_صارم"               = "StrictStr"
"قيد_نص"                = "constr"
"قيد_عدد"               = "conint"
"قيد_عشري"              = "confloat"
"قيد_قائمه"             = "conlist"

[attributes]
# BaseModel instance/class attributes for explicit ClassProxy use.
"اعدادات_النموذج"       = "model_config"
"انسخ_النموذج"          = "model_copy"
"افرغ"                  = "model_dump"
"افرغ_json"             = "model_dump_json"
"حقول_النموذج"          = "model_fields"
"تحقق_النموذج"          = "model_validate"
"مخطط_json"             = "model_json_schema"
