# arabicpython/aliases/openpyxl.toml
# C-020: Arabic aliases for openpyxl workbooks, worksheets, cells, styles, and charts.

[meta]
arabic_name    = "جداول_اكسل"
python_module  = "openpyxl"
dict_version   = "ar-v1"
schema_version = 1
maintainer     = "—"
proxy_classes  = ["Workbook"]

[entries]
# Workbook, worksheet, and cell core
"مصنف"                   = "Workbook"
"افتح_مصنف"              = "load_workbook"
"ورقه_عمل"               = "worksheet.worksheet.Worksheet"
"خليه"                   = "cell.cell.Cell"
"تعليق"                  = "comments.Comment"
"جدول"                   = "worksheet.table.Table"

# Workbook instance methods (ClassFactory -> InstanceProxy)
"ورقه_نشطه"              = "Workbook.active"
"انشئ_ورقه"              = "Workbook.create_sheet"
"احفظ_مصنف"              = "Workbook.save"
"انسخ_ورقه"              = "Workbook.copy_worksheet"
"احذف_ورقه"              = "Workbook.remove"

# Styles
"خط"                     = "styles.Font"
"تعبئه_نمط"              = "styles.PatternFill"
"محاذاه"                 = "styles.Alignment"
"حدود"                   = "styles.Border"
"جانب_حد"                = "styles.Side"

# Charts
"مخطط_اعمده"             = "chart.BarChart"
"مخطط_مساحه"             = "chart.AreaChart"
"مخطط_خط"                = "chart.LineChart"
"مخطط_دائري"             = "chart.PieChart"
"مخطط_رادار"             = "chart.RadarChart"
"مخطط_مبعثر"             = "chart.ScatterChart"
"مرجع_رسم"               = "chart.Reference"
"سلسله_رسم"              = "chart.Series"

# Utilities
"حرف_عمود"               = "utils.get_column_letter"
"رقم_عمود"               = "utils.column_index_from_string"
"نمط_مسمي"               = "styles.NamedStyle"
"قاعده_خليه"             = "formatting.rule.CellIsRule"
"قاعده_مقياس_لون"        = "formatting.rule.ColorScaleRule"

[attributes]
# Workbook, Worksheet, and Cell attributes for explicit ClassProxy use.
"ورقه_نشطه"              = "active"
"عنوان"                  = "title"
"احفظ"                   = "save"
"انشئ_ورقه"              = "create_sheet"
"احذف_ورقه"              = "remove"
"انسخ_ورقه"              = "copy_worksheet"
"اضف_صف"                 = "append"
"خليه"                   = "cell"
"ادمج_خلايا"             = "merge_cells"
"افصل_خلايا"             = "unmerge_cells"
"عدد_صفوف"               = "max_row"
"عدد_اعمده"              = "max_column"
"قيم"                    = "values"
"قيمه"                   = "value"
"احداثي"                 = "coordinate"
"خط"                     = "font"
"تعبئه"                  = "fill"
"محاذاه"                 = "alignment"
"تنسيق_رقم"              = "number_format"
