<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Al Kulaib branded banner for Lughat Althuban</title>
  <desc id="desc">A dark navy and off-white repository banner using the Abdullah Al Kulaib AK monogram and the Lughat Althuban Arabic Python project title.</desc>
