  <rect x="0" y="0" width="42" height="420" fill="#ea6753"/>
  <rect x="1040" y="0" width="360" height="420" fill="#f5f6fc"/>
  <rect x="1040" y="0" width="22" height="420" fill="#2c1a66"/>
